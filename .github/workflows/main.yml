name: Deploy ASP.NET Core App to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: craft-airtravel   # set this to your application's name
  AZURE_WEBAPP_PACKAGE_PATH: './publish'      # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '10.0.x'           # set this to the dot net version to use

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: [AirTravelApiv1, AirTravelAccomodations]

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true

      - name: Build with dotnet
        run: dotnet build --configuration Release
        working-directory: ./API/TestASApi/${{ matrix.api }}

      - name: dotnet publish
        run: |
          dotnet publish -c Release -o ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
        working-directory: ./API/TestASApi/${{ matrix.api }}
          
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app-${{ matrix.api }}
          path: API/TestASApi/${{ matrix.api }}/publish

  deploy-infra:
    runs-on: ubuntu-latest
    needs: build
    environment: 'Production'
    outputs:
      appConfigEndpoint: ${{ steps.arm.outputs.appConfigEndpoint }}
      appInsightsConnectionString: ${{ steps.arm.outputs.appInsightsConnectionString }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALSV1 }}

      - name: Create resource group
        uses: azure/cli@v1
        with:
          inlineScript: |
            az group create --name craft-travel-app --location "East US"

      - name: Create parameters file - override.json
        run: |
          echo '{
            "$schema": "https://schema.management.azure.com/schemas/2015-01-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "webAppNames": {
                "value": [
                  "${{ env.AZURE_WEBAPP_NAME }}",
                  "${{ env.AZURE_WEBAPP_NAME }}-accomodations"
                ]
              }
            }
          }' > override.json

      - name: Deploy ARM Template
        id: arm
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: craft-travel-app
          template: ./.github/workflows/azure-deploy.json
          parameters: override.json
          deploymentOutputs: appInsightsConnectionString, appConfigEndpoint

      - name: Log Deployment Outputs
        run: |
          echo "Insights created: ${{ steps.arm.outputs.appInsightsConnectionString }}"
          echo "App Config Endpoint: ${{ steps.arm.outputs.appConfigEndpoint }}"

  deploy:
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    strategy:
      matrix:
        api: [AirTravelApiv1, AirTravelAccomodations]

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app-${{ matrix.api }}
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALSV1 }}
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}${{ matrix.api == 'AirTravelAccomodations' && '-accomodations' || '' }}
          slot-name: 'Production'
          package: '.'
          app-settings: |
            AZURE_Travel_APPCONFIG=${{ needs.deploy-infra.outputs.appConfigEndpoint }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra.outputs.appInsightsConnectionString }}
          app-settings-json: |
            [
              {
                "name": "AZURE_Travel_APPCONFIG",
                "value": "${{ needs.deploy-infra.outputs.appConfigEndpoint }}",
                "slotSetting": false
              },
              {
                "name": "APPLICATIONINSIGHTS_CONNECTION_STRING",
                "value": "${{ needs.deploy-infra.outputs.appInsightsConnectionString }}",
                "slotSetting": false
              }
            ]

      - name: Set fallback environment variables
        if: steps.deploy-to-webapp.outputs.webapp-url
        shell: pwsh
        run: |
          $appSettings = az webapp config appsettings list --name "${{ env.AZURE_WEBAPP_NAME }}${{ matrix.api == 'AirTravelAccomodations' && '-accomodations' || '' }}" --resource-group craft-travel-app --query "[?name=='APPLICATIONINSIGHTS_CONNECTION_STRING' || name=='AZURE_Travel_APPCONFIG']" | ConvertFrom-Json
          $appInsightsSetting = $appSettings | Where-Object { $_.name -eq 'APPLICATIONINSIGHTS_CONNECTION_STRING' }
          $appConfigSetting = $appSettings | Where-Object { $_.name -eq 'AZURE_Travel_APPCONFIG' }

          if (-not $appInsightsSetting) {
            az webapp config appsettings set --name "${{ env.AZURE_WEBAPP_NAME }}${{ matrix.api == 'AirTravelAccomodations' && '-accomodations' || '' }}" --resource-group craft-travel-app --settings "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra.outputs.appInsightsConnectionString }}"
            Write-Host "Set APPLICATIONINSIGHTS_CONNECTION_STRING as a fallback."
          } else {
            Write-Host "APPLICATIONINSIGHTS_CONNECTION_STRING is already set."
          }

          if (-not $appConfigSetting) {
            az webapp config appsettings set --name "${{ env.AZURE_WEBAPP_NAME }}${{ matrix.api == 'AirTravelAccomodations' && '-accomodations' || '' }}" --resource-group craft-travel-app --settings "AZURE_Travel_APPCONFIG=${{ needs.deploy-infra.outputs.appConfigEndpoint }}"
            Write-Host "Set AZURE_Travel_APPCONFIG as a fallback."
          } else {
            Write-Host "AZURE_Travel_APPCONFIG is already set."
          }

      - name: Web App - Log Deployment Outputs
        run: |
          echo "Insights created: ${{ needs.deploy-infra.outputs.appInsightsConnectionString }}"
          echo "App Config Endpoint: ${{ needs.deploy-infra.outputs.appConfigEndpoint }}"

      