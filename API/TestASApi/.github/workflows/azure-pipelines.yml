name: Deploy ASP.NET Core App to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'           # set this to the dot net version to use

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: AirTravelAccomodations
            path: 'AirTravelAccomodations/AirTravelAccomodations.csproj'
            webapp-name: 'craft-airtravel-accomodations'
          - name: AirTravelApi
            path: 'AirTravelApiv1/AirTravelApiv1.csproj'
            webapp-name: 'craft-airtravel-api'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true

      - name: Build with dotnet
        run: dotnet build ${{ matrix.project.path }} --configuration Release

      - name: dotnet publish
        run: |
          dotnet publish ${{ matrix.project.path }} -c Release -o ${{ matrix.project.name }}/publish
          
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}
          path: ${{ matrix.project.name }}/publish

  deploy-infra:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment: 'Production'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ARM Template
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: craft-travel-app
          template: ./azure-deploy.json

  deploy:
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment:
      name: 'Production'
    strategy:
      matrix:
        project:
          - name: AirTravelAccomodations
            webapp-name: 'craft-airtravel-accomodations'
          - name: AirTravelApi
            webapp-name: 'craft-airtravel-api'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.project.name }}
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ matrix.project.webapp-name }}
          slot-name: 'Production'
          package: .
